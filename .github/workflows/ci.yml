name: CI

# Three layers, all free of secrets and network spend:
#   contract — seconds; lint + types + the jomjol JSON/topic contract test
#              (tests/test_contract.py needs no downloaded assets). Safe to
#              require as a status check before merge.
#   unit     — seconds; fetches the tflite model + digit crops (cached),
#              then `just test-fast` (default suite in parallel via
#              pytest-xdist). Reader tests skip if the fetch is flaky,
#              so this stays green either way. Safe to require.
#   e2e      — spins up the docker-compose mosquitto broker (same config as
#              `just broker-up`) and runs the MQTT integration test over the
#              wire. A readiness gate fails the job if the broker never comes
#              up, so a dead broker can't hide behind the test's skip path.
#
# Runs on GitHub-hosted runners. If this repo gets enrolled in the org's
# Namespace GitHub App, swap `runs-on: ubuntu-latest` for
# `namespace-profile-default` (as in syft-influencer).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyrefly check

      - name: Contract test (jomjol JSON payload + MQTT topics; no assets)
        run: uv run pytest tests/test_contract.py

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      # Model + digit crops only re-download when the fetch script changes.
      - name: Cache fetched assets
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: data
          key: assets-${{ hashFiles('scripts/fetch_assets.py') }}

      - name: Fetch model + digit crops
        run: just fetch-assets

      - name: Unit tests (parallel via pytest-xdist)
        run: just test-fast

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      # The integration test builds a real VirtualDevice, so it needs the
      # same model + digit crops the unit job fetches.
      - name: Cache fetched assets
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: data
          key: assets-${{ hashFiles('scripts/fetch_assets.py') }}

      - name: Fetch model + digit crops
        run: just fetch-assets

      # Reuse the repo's compose broker so CI and local dev speak to an
      # identically-configured mosquitto.
      - name: Start MQTT broker
        run: just broker-up

      # Fail loudly if the broker never binds 1883 — otherwise the test's
      # connect-refused skip path would turn a broken broker into a green run.
      - name: Wait for broker
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/1883) 2>/dev/null; then
              echo "broker up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "mosquitto never bound localhost:1883"; docker compose logs mosquitto; exit 1

      - name: Integration test (MQTT publish path over the wire)
        run: uv run pytest -m integration

      - name: Stop MQTT broker
        if: always()
        run: just broker-down
