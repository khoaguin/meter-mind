name: WIF verify (temporary)

# Throwaway workflow to prove Workload Identity Federation works end-to-end:
# it performs the GitHub OIDC -> GCP token exchange, impersonates the deployer
# SA, and makes real (read-only) GCP calls. No build, no deploy. Delete after.
on:
  push:
    branches: [ci/cloud-run-cicd]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Who am I (should be the deployer SA)
        run: gcloud auth list --filter=status:ACTIVE --format='value(account)'

      - name: Read Artifact Registry repo (exercises impersonated IAM)
        run: gcloud artifacts repositories describe meter-mind --location=asia-southeast1 --format='value(name,format)'

      - name: Confirm Cloud Run access (list services)
        run: gcloud run services list --region=asia-southeast1 --format='value(metadata.name)' || echo "(no services yet — access OK)"
