repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix", "--show-fixes"]
      - id: ruff-format

  # Pyrefly runs at push time (not per-commit) because it checks the whole
  # project. Catches type drift before CI without slowing per-commit iteration.
  - repo: local
    hooks:
      - id: pyrefly
        name: Pyrefly type check
        entry: uv run pyrefly check
        language: system
        pass_filenames: false
        stages: [pre-push]
